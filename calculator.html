<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --surface3: #2a2a32;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text-primary: #f0ede8;
    --text-secondary: #8a8790;
    --text-muted: #4a4856;
    --accent: #c8b8f0;
    --accent-dim: #7a68b8;
    --accent-glow: rgba(200,184,240,0.15);
    --operator-bg: #221f35;
    --operator-hover: #2e2848;
    --operator-active: #3a3260;
    --equals-bg: #b5a0e8;
    --equals-hover: #c8b5f5;
    --equals-text: #1a1528;
    --danger: #e87a7a;
    --danger-bg: #2a1e1e;
    --radius: 14px;
    --radius-sm: 10px;
    --btn-radius: 16px;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--text-primary);
    padding: 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(150,120,220,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .calc-wrapper {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
  }

  .calc-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 400;
  }

  .calc {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 28px;
    padding: 24px;
    width: 360px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 40px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(100,80,180,0.06);
    position: relative;
    overflow: hidden;
  }

  .calc::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,184,240,0.3), transparent);
  }

  /* DISPLAY */
  .display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px 14px;
    margin-bottom: 20px;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }

  .display::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  }

  .expression {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-secondary);
    text-align: right;
    min-height: 18px;
    letter-spacing: 0.02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .result-line {
    display: flex;
    align-items: baseline;
    justify-content: flex-end;
    gap: 8px;
  }

  .main-display {
    font-family: 'DM Mono', monospace;
    font-size: 42px;
    font-weight: 300;
    color: var(--text-primary);
    text-align: right;
    letter-spacing: -0.02em;
    line-height: 1;
    transition: font-size 0.1s, color 0.2s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }

  .main-display.error { color: var(--danger); font-size: 22px; }
  .main-display.lg { font-size: 32px; }
  .main-display.sm { font-size: 24px; }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 0.85em;
    background: var(--accent);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1.1s step-end infinite;
    border-radius: 1px;
    opacity: 0;
  }
  .cursor-blink.active { opacity: 1; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* KEYBOARD HINT */
  .kb-hint {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    margin-bottom: 14px;
    letter-spacing: 0.04em;
    height: 14px;
    transition: opacity 0.3s;
  }
  .kb-hint.hide { opacity: 0; }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  /* BUTTONS */
  .btn {
    height: 68px;
    border-radius: var(--btn-radius);
    border: none;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, transform 0.08s, box-shadow 0.1s, border-color 0.1s;
    position: relative;
    outline: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { transform: scale(0.93); }

  .btn.flash {
    animation: flash 0.15s ease;
  }
  @keyframes flash {
    0% { transform: scale(0.91); }
    60% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  /* Number buttons */
  .btn-num {
    background: var(--surface3);
    color: var(--text-primary);
    border: 1px solid var(--border);
    font-size: 20px;
    font-weight: 400;
  }
  .btn-num:hover { background: #303038; border-color: var(--border2); }
  .btn-num:active { background: #383844; }

  /* Zero (wide) */
  .btn-zero {
    grid-column: span 2;
    justify-content: flex-start;
    padding-left: 26px;
    font-size: 20px;
  }

  /* Operators */
  .btn-op {
    background: var(--operator-bg);
    color: var(--accent);
    border: 1px solid rgba(150,130,220,0.2);
    font-size: 22px;
    font-weight: 400;
  }
  .btn-op:hover { background: var(--operator-hover); border-color: rgba(150,130,220,0.35); }
  .btn-op:active { background: var(--operator-active); }
  .btn-op.active-op {
    background: var(--accent-glow);
    border-color: rgba(200,184,240,0.5);
    box-shadow: inset 0 0 12px rgba(200,184,240,0.08);
  }

  /* Utility (AC, +/-, %) */
  .btn-util {
    background: var(--surface3);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .btn-util:hover { background: #303038; color: var(--text-primary); border-color: var(--border2); }
  .btn-util.danger-mode { color: var(--danger); }
  .btn-util.danger-mode:hover { background: var(--danger-bg); }

  /* Equals */
  .btn-eq {
    background: var(--equals-bg);
    color: var(--equals-text);
    border: none;
    font-size: 22px;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(181,160,232,0.25);
  }
  .btn-eq:hover { background: var(--equals-hover); box-shadow: 0 6px 28px rgba(181,160,232,0.35); }
  .btn-eq:active { background: #a090d8; box-shadow: 0 2px 10px rgba(181,160,232,0.2); }

  /* Ripple */
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    background: rgba(255,255,255,0.06);
    transition: opacity 0.2s;
  }
  .btn:hover::after { opacity: 1; }

  /* Keyboard shortcut badge */
  .kb-badge {
    position: absolute;
    bottom: 7px;
    right: 9px;
    font-size: 9px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .calc:hover .kb-badge { opacity: 1; }

  /* History drawer */
  .history-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .history-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 8px;
  }

  .history-item {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    text-align: right;
    line-height: 1.5;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .history-item:hover { background: var(--surface3); color: var(--text-primary); }
  .history-item span { color: var(--text-muted); font-size: 11px; }

  .clear-hist {
    background: none;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .clear-hist:hover { color: var(--danger); background: var(--danger-bg); }

  /* Footer */
  .calc-footer {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.08em;
  }
  .calc-footer kbd {
    background: var(--surface3);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 1px 5px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-secondary);
  }
</style>
</head>
<body>

<div class="calc-wrapper">
  <div class="calc-label">Calculator</div>

  <div class="calc" id="calc">
    <!-- Display -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result-line">
        <div class="main-display" id="main-display">0</div>
        <span class="cursor-blink active" id="cursor"></span>
      </div>
    </div>

    <div class="kb-hint" id="kb-hint">↑ keyboard supported</div>

    <!-- Button grid -->
    <div class="grid" id="grid">

      <!-- Row 1: Utility + divide -->
      <button class="btn btn-util" data-action="clear" id="clear-btn" title="Clear [Escape]">
        AC <span class="kb-badge">esc</span>
      </button>
      <button class="btn btn-util" data-action="toggle-sign" title="Toggle sign [F9]">
        ±  <span class="kb-badge">F9</span>
      </button>
      <button class="btn btn-util" data-action="percent" title="Percent [%]">
        %  <span class="kb-badge">%</span>
      </button>
      <button class="btn btn-op" data-action="operator" data-value="÷" title="Divide [/]">
        ÷  <span class="kb-badge">/</span>
      </button>

      <!-- Row 2: 7 8 9 × -->
      <button class="btn btn-num" data-action="number" data-value="7" title="7">7</button>
      <button class="btn btn-num" data-action="number" data-value="8" title="8">8</button>
      <button class="btn btn-num" data-action="number" data-value="9" title="9">9</button>
      <button class="btn btn-op" data-action="operator" data-value="×" title="Multiply [*]">
        ×  <span class="kb-badge">*</span>
      </button>

      <!-- Row 3: 4 5 6 - -->
      <button class="btn btn-num" data-action="number" data-value="4" title="4">4</button>
      <button class="btn btn-num" data-action="number" data-value="5" title="5">5</button>
      <button class="btn btn-num" data-action="number" data-value="6" title="6">6</button>
      <button class="btn btn-op" data-action="operator" data-value="−" title="Subtract [-]">
        −  <span class="kb-badge">-</span>
      </button>

      <!-- Row 4: 1 2 3 + -->
      <button class="btn btn-num" data-action="number" data-value="1" title="1">1</button>
      <button class="btn btn-num" data-action="number" data-value="2" title="2">2</button>
      <button class="btn btn-num" data-action="number" data-value="3" title="3">3</button>
      <button class="btn btn-op" data-action="operator" data-value="+" title="Add [+]">
        +  <span class="kb-badge">+</span>
      </button>

      <!-- Row 5: 0 . = -->
      <button class="btn btn-num btn-zero" data-action="number" data-value="0" title="0">
        0
      </button>
      <button class="btn btn-num" data-action="decimal" title="Decimal [.]">
        .  <span class="kb-badge">.</span>
      </button>
      <button class="btn btn-eq" data-action="equals" title="Equals [Enter]">
        =  <span class="kb-badge">⏎</span>
      </button>
    </div>

    <!-- History -->
    <div class="history-bar">
      <span class="history-label">History</span>
      <button class="clear-hist" id="clear-hist-btn" onclick="clearHistory()">clear</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-item" style="color: var(--text-muted); font-size: 11px; text-align:center; padding: 4px 0;">
        no calculations yet
      </div>
    </div>
  </div>

  <div class="calc-footer">
    <kbd>0–9</kbd>&nbsp;numbers &nbsp;·&nbsp;
    <kbd>+ - * /</kbd>&nbsp;operators &nbsp;·&nbsp;
    <kbd>Enter</kbd>&nbsp;equals &nbsp;·&nbsp;
    <kbd>Esc</kbd>&nbsp;clear &nbsp;·&nbsp;
    <kbd>Backspace</kbd>&nbsp;delete
  </div>
</div>

<script>
  const display = document.getElementById('main-display');
  const exprEl = document.getElementById('expression');
  const cursor = document.getElementById('cursor');
  const clearBtn = document.getElementById('clear-btn');
  const kbHint = document.getElementById('kb-hint');
  const histList = document.getElementById('history-list');

  let currentVal = '0';
  let prevVal = '';
  let operator = null;
  let waitingForOperand = false;
  let justEvaluated = false;
  let history = [];
  let hasKeyboard = false;

  const opMap = { '÷': '/', '×': '*', '−': '-', '+': '+' };

  function updateDisplay(val, cls = '') {
    let txt = val;
    const len = txt.replace('-','').replace('.','').length;
    display.className = 'main-display';
    if (cls) display.classList.add(cls);
    else if (len >= 14) display.classList.add('sm');
    else if (len >= 10) display.classList.add('lg');
    display.textContent = txt;
  }

  function formatNum(n) {
    if (isNaN(n) || !isFinite(n)) return n.toString();
    let s = parseFloat(n.toPrecision(12)).toString();
    if (s.includes('e')) return n.toExponential(6);
    return s;
  }

  function flashBtn(el) {
    if (!el) return;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  function setActiveOp(op) {
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
    if (op) {
      document.querySelectorAll('.btn-op').forEach(b => {
        if (b.dataset.value === op) b.classList.add('active-op');
      });
    }
  }

  function updateClearBtn() {
    clearBtn.textContent = (currentVal !== '0' || prevVal) ? 'C' : 'AC';
    clearBtn.classList.toggle('danger-mode', currentVal !== '0' || !!prevVal);
    const badge = document.createElement('span');
    badge.className = 'kb-badge';
    badge.textContent = 'esc';
    clearBtn.appendChild(badge);
  }

  function addHistory(expr, result) {
    history.unshift({ expr, result });
    if (history.length > 5) history.pop();
    renderHistory();
  }

  function renderHistory() {
    if (!history.length) {
      histList.innerHTML = '<div class="history-item" style="color:var(--text-muted);font-size:11px;text-align:center;padding:4px 0;">no calculations yet</div>';
      return;
    }
    histList.innerHTML = history.map((h, i) =>
      `<div class="history-item" onclick="recallHistory(${i})">
        <span>${h.expr} =</span> ${h.result}
      </div>`
    ).join('');
  }

  window.recallHistory = function(i) {
    const h = history[i];
    currentVal = h.result;
    prevVal = '';
    operator = null;
    waitingForOperand = false;
    justEvaluated = true;
    exprEl.textContent = h.expr + ' =';
    updateDisplay(currentVal);
    updateClearBtn();
  };

  window.clearHistory = function() {
    history = [];
    renderHistory();
  };

  function inputNumber(n) {
    cursor.classList.add('active');
    if (justEvaluated) {
      currentVal = n;
      justEvaluated = false;
      exprEl.textContent = '';
    } else if (waitingForOperand) {
      currentVal = n;
      waitingForOperand = false;
    } else {
      if (currentVal === '0') currentVal = n;
      else if (currentVal.length < 16) currentVal += n;
    }
    updateDisplay(currentVal);
    updateClearBtn();
  }

  function inputDecimal() {
    cursor.classList.add('active');
    if (justEvaluated) { currentVal = '0.'; justEvaluated = false; exprEl.textContent = ''; updateDisplay(currentVal); return; }
    if (waitingForOperand) { currentVal = '0.'; waitingForOperand = false; updateDisplay(currentVal); return; }
    if (!currentVal.includes('.')) currentVal += '.';
    updateDisplay(currentVal);
    updateClearBtn();
  }

  function inputOperator(op) {
    cursor.classList.remove('active');
    const cur = parseFloat(currentVal);
    if (operator && !waitingForOperand) {
      const result = calculate(parseFloat(prevVal), cur, operator);
      currentVal = formatNum(result);
      prevVal = currentVal;
      updateDisplay(currentVal);
    } else {
      prevVal = currentVal;
    }
    operator = op;
    waitingForOperand = true;
    justEvaluated = false;
    exprEl.textContent = prevVal + ' ' + op;
    setActiveOp(op);
    updateClearBtn();
  }

  function calculate(a, b, op) {
    switch (op) {
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b === 0 ? Infinity : a / b;
    }
    return b;
  }

  function inputEquals() {
    cursor.classList.remove('active');
    if (!operator) return;
    const a = parseFloat(prevVal);
    const b = parseFloat(currentVal);
    const raw = calculate(a, b, operator);
    const expr = `${prevVal} ${operator} ${currentVal}`;
    let result;
    if (!isFinite(raw)) {
      updateDisplay('Cannot divide by 0', 'error');
      operator = null; prevVal = ''; waitingForOperand = false; justEvaluated = true;
      exprEl.textContent = expr + ' =';
      setTimeout(() => { currentVal = '0'; updateDisplay('0'); exprEl.textContent = ''; }, 1800);
      return;
    } else {
      result = formatNum(raw);
    }
    exprEl.textContent = expr + ' =';
    currentVal = result;
    operator = null;
    prevVal = '';
    waitingForOperand = false;
    justEvaluated = true;
    updateDisplay(currentVal);
    setActiveOp(null);
    addHistory(expr, result);
    updateClearBtn();
  }

  function inputClear() {
    cursor.classList.add('active');
    if (currentVal !== '0' && !waitingForOperand) {
      currentVal = '0';
      updateDisplay('0');
      updateClearBtn();
    } else {
      currentVal = '0'; prevVal = ''; operator = null; waitingForOperand = false; justEvaluated = false;
      exprEl.textContent = '';
      updateDisplay('0');
      setActiveOp(null);
      clearBtn.textContent = 'AC';
      clearBtn.classList.remove('danger-mode');
      const b = document.createElement('span'); b.className='kb-badge'; b.textContent='esc'; clearBtn.appendChild(b);
    }
  }

  function inputToggleSign() {
    if (currentVal === '0') return;
    currentVal = (parseFloat(currentVal) * -1).toString();
    updateDisplay(currentVal);
  }

  function inputPercent() {
    const val = parseFloat(currentVal) / 100;
    currentVal = formatNum(val);
    updateDisplay(currentVal);
  }

  function inputBackspace() {
    if (waitingForOperand || justEvaluated) return;
    if (currentVal.length <= 1 || currentVal === '-0') {
      currentVal = '0';
    } else {
      currentVal = currentVal.slice(0, -1);
      if (currentVal === '-') currentVal = '0';
    }
    updateDisplay(currentVal);
    updateClearBtn();
  }

  // Click handler
  document.getElementById('grid').addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    flashBtn(btn);
    const { action, value } = btn.dataset;
    if (action === 'number') inputNumber(value);
    else if (action === 'decimal') inputDecimal();
    else if (action === 'operator') inputOperator(value);
    else if (action === 'equals') inputEquals();
    else if (action === 'clear') inputClear();
    else if (action === 'toggle-sign') inputToggleSign();
    else if (action === 'percent') inputPercent();
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (!hasKeyboard) {
      hasKeyboard = true;
      kbHint.classList.add('hide');
    }
    const k = e.key;
    let btnSel = null;

    if (k >= '0' && k <= '9') { inputNumber(k); btnSel = `[data-value="${k}"]`; }
    else if (k === '.') { inputDecimal(); btnSel = '[data-action="decimal"]'; }
    else if (k === '+') { inputOperator('+'); btnSel = '[data-value="+"]'; }
    else if (k === '-') { inputOperator('−'); btnSel = '[data-value="−"]'; }
    else if (k === '*') { inputOperator('×'); btnSel = '[data-value="×"]'; }
    else if (k === '/') { e.preventDefault(); inputOperator('÷'); btnSel = '[data-value="÷"]'; }
    else if (k === 'Enter' || k === '=') { inputEquals(); btnSel = '[data-action="equals"]'; }
    else if (k === 'Escape') { inputClear(); btnSel = '[data-action="clear"]'; }
    else if (k === 'Backspace') { e.preventDefault(); inputBackspace(); }
    else if (k === '%') { inputPercent(); btnSel = '[data-action="percent"]'; }
    else if (k === 'F9') { inputToggleSign(); btnSel = '[data-action="toggle-sign"]'; }

    if (btnSel) {
      const el = document.querySelector(btnSel);
      if (el) flashBtn(el);
    }
  });

  updateClearBtn();
</script>
</body>
</html>
